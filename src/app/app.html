<div class="app-shell" [class.collapsed]="collapsed()">

  <!-- ───── Sidebar ───── -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l7 4v6c0 4-3.5 7.5-7 9-3.5-1.5-7-5-7-9V6l7-4z"/>
        </svg>
      </div>
      <div class="brand-text" *ngIf="!collapsed()">
        <span class="brand-name">WCGW-Intel</span>
        <span class="brand-badge">PROD</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="nav">
      <ng-container *ngFor="let item of navItems">

        <!-- Enabled item -->
        <a
          *ngIf="item.enabled"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{exact: false}"
          class="nav-item"
          [title]="collapsed() ? item.label : ''"
        >
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span class="nav-label" *ngIf="!collapsed()">{{ item.label }}</span>
        </a>

        <!-- Disabled item -->
        <span
          *ngIf="!item.enabled"
          class="nav-item disabled"
          [title]="collapsed() ? item.label + ' (unavailable)' : ''"
        >
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span class="nav-label" *ngIf="!collapsed()">{{ item.label }}</span>
        </span>

      </ng-container>
    </nav>

    <!-- Collapse toggle -->
    <button class="collapse-btn" (click)="toggleCollapse()" [title]="collapsed() ? 'Expand' : 'Collapse'">
      <svg class="chevron" [class.rotated]="collapsed()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="collapse-label" *ngIf="!collapsed()">Collapse</span>
    </button>

  </aside>

  <!-- ───── Main area ───── -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title">WCGW-Intel</h1>
      </div>
      <div class="topbar-right">
        <div class="role-tabs">
          <button
            *ngFor="let role of roles"
            class="role-tab"
            [class.active]="activeRole() === role"
            (click)="activeRole.set(role)"
          >{{ role }}</button>
        </div>
        <button class="icon-btn" title="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="icon-btn notif-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge">3</span>
        </button>
        <div class="user-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="user-name">admin
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;vertical-align:middle">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </header>

    <!-- Content -->
    <main class="content">
      <router-outlet />
    </main>

  </div>
</div>
